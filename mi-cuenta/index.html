<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta — YCA Cerámica</title>

  <link rel="icon" type="image/png" href="../imagenes/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="cuenta-wrapper">

    <!-- HEADER DE BIENVENIDA -->
    <div class="cuenta-header">
      <div class="cuenta-avatar" id="cuentaAvatar" style="width:56px;height:56px;min-width:56px;min-height:56px;border-radius:50%;aspect-ratio:1/1">?</div>
      <div>
        <h1 id="cuentaNombre">Cargando...</h1>
        <span id="planBadge" style="display:none;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(201,162,39,0.15);color:#c9a227;border:1.5px solid rgba(201,162,39,0.3);margin-bottom:6px;">⭐ Pro</span>
        <p id="cuentaCurso">Mi curso</p>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">
        <i class="fa-solid fa-right-from-bracket"></i> Salir
      </button>
    </div>

    <!-- TABS -->
    <div class="cuenta-tabs">
      <button class="ctab activo" onclick="setTab('apuntes')" id="ctab-apuntes">
        <i class="fa-solid fa-book-open"></i> Apuntes
      </button>
      <button class="ctab" onclick="setTab('multimedia')" id="ctab-multimedia">
        <i class="fa-solid fa-photo-film"></i> Multimedia
      </button>
      <button class="ctab" onclick="setTab('historial')" id="ctab-historial">
        <i class="fa-solid fa-clock-rotate-left"></i> Historial
      </button>
      <button class="ctab" onclick="setTab('contrasena')" id="ctab-contrasena">
        <i class="fa-solid fa-lock"></i> Contraseña
      </button>
    </div>

    <!-- APUNTES -->
    <div class="cuenta-seccion" id="sec-apuntes">
      <div class="apuntes-grid" id="apuntesGrid">
        <div class="cuenta-loading">
          <i class="fa-solid fa-spinner fa-spin"></i> Cargando apuntes...
        </div>
      </div>
    </div>

    <!-- MULTIMEDIA -->
    <div class="cuenta-seccion" id="sec-multimedia" style="display:none">
      <div class="multimedia-lista" id="multimediaLista">
        <div class="cuenta-loading">
          <i class="fa-solid fa-spinner fa-spin"></i> Cargando multimedia...
        </div>
      </div>
    </div>

    <!-- HISTORIAL -->
    <div class="cuenta-seccion" id="sec-historial" style="display:none">
      <div class="historial-taller-header">
        <p>Tus cálculos guardados desde las calculadoras. Usá el botón "Guardar en mi cuenta" en cualquier calculadora.</p>
        <div style="display:flex;gap:10px;flex-shrink:0">
          <button class="btn-descargar-historial" onclick="descargarHistorialPDF()" id="btnHistorialPDF" disabled>
            <i class="fa-solid fa-file-pdf"></i> PDF
          </button>
          <button class="btn-limpiar-historial" onclick="pedirLimpiarTodo()" id="btnLimpiarTodo" style="display:none">
            <i class="fa-solid fa-trash"></i> Eliminar todo
          </button>
        </div>
      </div>
            <div class="historial-filtros" id="historialFiltros" style="display:none">
        <div class="hfiltro-select-wrapper">
          <i class="fa-solid fa-filter"></i>
          <select class="hfiltro-select" id="hfiltroSelect" onchange="filtrarHistorial(this.value, this)">
            <option value="todos">📋 Todas las calculadoras</option>
            <option value="yeso">🧱 Yeso</option>
            <option value="engobes">🎨 Engobes</option>
            <option value="coccion">🌡️ Cocción</option>
            <option value="contraccion">📐 Contracción</option>
            <option value="costos">💰 Costos</option>
            <option value="pastas">🫙 Pastas</option>
            <option value="esmaltes">⚗️ Esmaltes</option>
            <option value="absorcion">💧 Absorción</option>
            <option value="breakeven">📊 Equilibrio</option>
            <option value="seger">🔬 Fórmula Seger</option>
            <option value="arcillas">🧱 Mezcla de Arcillas</option>
            <option value="pruebas">🧪 Pruebas de colorantes</option>
          </select>
        </div>
      </div>
      <div class="historial-taller-grid" id="historialGrid">
        <div class="cuenta-loading">
          <i class="fa-solid fa-spinner fa-spin"></i> Cargando historial...
        </div>
      </div>
    </div>

    <!-- MODAL CONFIRMACIÓN -->
    <div id="alumnoModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;padding:20px">
      <div style="background:var(--color-superficie);border-radius:16px;padding:0;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden">
        <div style="padding:20px 20px 0">
          <h3 id="alumnoModalTitulo" style="font-size:16px;margin:0 0 10px"></h3>
          <p id="alumnoModalTexto" style="font-size:14px;margin:0;opacity:0.75;line-height:1.5"></p>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;padding:20px">
          <button onclick="cerrarModalAlumno()" style="padding:9px 18px;border-radius:20px;border:1.5px solid #d8cfc4;background:transparent;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--color-texto)">Cancelar</button>
          <button id="alumnoModalConfirmar" style="padding:9px 18px;border-radius:20px;border:none;background:#c85028;color:white;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">Eliminar</button>
        </div>
      </div>
    </div>

    <!-- CAMBIAR CONTRASEÑA -->
    <div class="cuenta-seccion" id="sec-contrasena" style="display:none">
      <div class="pass-cambiar-card">
        <h3><i class="fa-solid fa-lock"></i> Cambiar contraseña</h3>

        <div class="form-grupo">
          <label>Contraseña actual</label>
          <div class="pass-wrapper">
            <input type="password" id="passActual" placeholder="Tu contraseña actual">
            <button class="pass-toggle" onclick="togglePassCuenta('passActual', this)" type="button">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-grupo">
          <label>Nueva contraseña</label>
          <div class="pass-wrapper">
            <input type="password" id="passNueva" placeholder="Mínimo 6 caracteres">
            <button class="pass-toggle" onclick="togglePassCuenta('passNueva', this)" type="button">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-grupo">
          <label>Repetir nueva contraseña</label>
          <div class="pass-wrapper">
            <input type="password" id="passRepetir" placeholder="Repetí la nueva contraseña">
            <button class="pass-toggle" onclick="togglePassCuenta('passRepetir', this)" type="button">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="pass-error" id="passError" style="display:none">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="passErrorMsg"></span>
        </div>

        <div class="pass-success" id="passSuccess" style="display:none">
          <i class="fa-solid fa-circle-check"></i>
          <span>¡Contraseña actualizada correctamente!</span>
        </div>

        <button class="btn-cambiar-pass" onclick="cambiarContrasena()" id="btnCambiarPass">
          <i class="fa-solid fa-floppy-disk"></i> Guardar nueva contraseña
        </button>
      </div>
    </div>

  </div>

  <footer>
    <p>© 2026 YCA Cerámica</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
  <script src="../nav-ceramista.js"></script>

</body>
</html>
