<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Conocé nuestros cursos y talleres de cerámica. Modalidades presenciales para todos los niveles.">
  <meta property="og:title" content="Cursos y Talleres — YCA Cerámica">
  <meta property="og:description" content="Conocé nuestros cursos y talleres de cerámica. Modalidades presenciales para todos los niveles.">
  <meta property="og:image" content="https://ycaceramica.github.io/imagenes/cursos/taller.jpg">
  <meta property="og:url" content="https://ycaceramica.github.io/cursos/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>Cursos y Talleres — YCA Cerámica</title>

  <link rel="icon" type="image/png" href="../imagenes/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

  <!-- BARRA -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <a href="../index.html">
          <img src="../imagenes/logo.png" alt="YCA Cerámica" style="height:38px;width:38px;border-radius:50%;vertical-align:middle;margin-right:8px;">YCA Cerámica
        </a>
      </div>
      <nav class="nav" id="nav">
        <a href="../index.html">Inicio</a>
        <a href="../index.html#productos">Productos</a>
        <a href="../herramientas/index.html">Herramientas</a>
        <a href="index.html">Cursos y Talleres</a>
        <a href="../index.html#galeria">Galería</a>
        <a href="../index.html#contacto">Contacto</a>
        <button id="toggleDark">🌙</button>
      </nav>
      <span class="hamburguesa" id="hamburguesa">☰</span>
    </div>
  </header>

  <!-- HERO -->
  <div class="cursos-hero">
    <div class="cursos-hero-contenido">
      <span class="cursos-tag">🏺 Talleres presenciales</span>
      <h1>Cursos y Talleres</h1>
      <p>Aprendé cerámica con nosotros. Distintas modalidades para todos los niveles.</p>
    </div>
  </div>

  <!-- FILTROS + GRID -->
  <div class="cursos-wrapper">

    <div class="filtros-wrapper">
      <button class="filtro-btn activo" onclick="filtrar('todos')" id="f-todos">Todos</button>
      <button class="filtro-btn" onclick="filtrar('activo')" id="f-activo">
        <span class="filtro-dot activo"></span>Activos
      </button>
      <button class="filtro-btn" onclick="filtrar('proximamente')" id="f-proximamente">
        <span class="filtro-dot proximamente"></span>Próximamente
      </button>
      <button class="filtro-btn" onclick="filtrar('finalizado')" id="f-finalizado">
        <span class="filtro-dot finalizado"></span>Finalizados
      </button>
    </div>

    <div class="cursos-grid" id="cursosGrid">
      <!-- Las tarjetas se cargan dinámicamente desde el panel admin -->
    </div>

    <div class="sin-resultados" id="sinResultados" style="display:none">
      <i class="fa-solid fa-magnifying-glass"></i>
      <p>No hay cursos en esta categoría por ahora.</p>
    </div>

  </div>

  <a class="whatsapp" href="https://wa.me/5491160387535" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <footer>
    <p>© 2026 YCA Cerámica</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
