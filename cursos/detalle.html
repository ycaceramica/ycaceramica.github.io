<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso — YCA Cerámica</title>
  <link rel="icon" type="image/png" href="../imagenes/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- BARRA -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <a href="../index.html">
          <img src="../imagenes/logo.png" alt="YCA Cerámica" style="height:38px;width:38px;border-radius:50%;vertical-align:middle;margin-right:8px;">YCA Cerámica
        </a>
      </div>
      <nav class="nav" id="nav">
        <a href="../index.html">Inicio</a>
        <a href="../index.html#productos">Productos</a>
        <a href="../herramientas/index.html">Herramientas</a>
        <a href="index.html">Cursos y Talleres</a>
        <a href="../index.html#galeria">Galería</a>
        <a href="../index.html#contacto">Contacto</a>
        <button id="toggleDark">🌙</button>
      </nav>
      <span class="hamburguesa" id="hamburguesa">☰</span>
    </div>
  </header>

  <div class="curso-wrapper" id="cursoWrapper">

    <a class="curso-volver" href="index.html">← Cursos y Talleres</a>

    <!-- LOADING -->
    <div id="cursoLoading" style="text-align:center;padding:80px 20px;opacity:0.5">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:24px"></i>
      <p style="margin-top:12px">Cargando curso...</p>
    </div>

    <!-- CONTENIDO — se llena dinámicamente -->
    <div id="cursoContenido" style="display:none"></div>

  </div>

  <a class="whatsapp" href="https://wa.me/5491160387535" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <footer>
    <p>© 2026 YCA Cerámica</p>
  </footer>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbzdwN7aMQVLT5qxzOPw78Cnyanu4BBkkiCXESmQN2Sx5SklNB-kQq-Xt2SGb0-Dgfv1/exec"

    // Modo oscuro
    if(localStorage.getItem("dark") === "true") document.body.classList.add("dark")
    const btnDark = document.getElementById("toggleDark")
    if(btnDark){
      btnDark.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙"
      btnDark.addEventListener("click", () => {
        document.body.classList.toggle("dark")
        localStorage.setItem("dark", document.body.classList.contains("dark"))
        btnDark.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙"
      })
    }

    // Hamburguesa
    const hamburguesa = document.getElementById("hamburguesa")
    const nav         = document.getElementById("nav")
    if(hamburguesa) hamburguesa.addEventListener("click", () => nav.classList.toggle("active"))
    document.querySelectorAll(".nav a").forEach(a => a.addEventListener("click", () => nav.classList.remove("active")))
    window.addEventListener("scroll", () => nav?.classList.remove("active"))

    // Cargar curso
    window.addEventListener("DOMContentLoaded", async () => {
      const params  = new URLSearchParams(window.location.search)
      const hojaId  = params.get("curso")

      if(!hojaId){
        window.location.href = "index.html"
        return
      }

      try {
        const res  = await fetch(`${API}?action=getCursoDetalle&hojaId=${encodeURIComponent(hojaId)}`)
        const data = await res.json()

        if(!data.ok || !data.data){
          window.location.href = "index.html"
          return
        }

        const c = data.data
        document.title = `${c.nombre} — YCA Cerámica`
        renderCurso(c)

      } catch(e) {
        document.getElementById('cursoLoading').innerHTML = `
          <i class="fa-solid fa-circle-exclamation" style="font-size:24px"></i>
          <p style="margin-top:12px">Error al cargar el curso. <a href="index.html">Volver</a></p>`
      }
    })

    function renderCurso(c){
      document.getElementById('cursoLoading').style.display  = 'none'
      document.getElementById('cursoContenido').style.display = 'block'

      const estado  = c.estado || 'proximamente'
      const labels  = { activo:'Activo', proximamente:'Próximamente', finalizado:'Finalizado' }

      // Chips
      const chips = c.chips
        ? c.chips.split('|').map(chip => `<span class="curso-chip">${chip.trim()}</span>`).join('')
        : ''

      // Proceso
      const pasos = c.proceso
        ? c.proceso.split('||').map((paso, idx) => {
            const partes = paso.split('|')
            const titulo = partes[0] || ''
            const desc   = partes[1] || ''
            return `
              <div class="curso-tecnica">
                <span class="tecnica-num">${titulo}</span>
                <div>
                  ${desc ? `<p>${desc}</p>` : ''}
                </div>
              </div>`
          }).join('')
        : ''

      // Info items
      const infoItems = [
        c.dia      ? { icono:'fa-regular fa-calendar', label:'Día y horario', valor: c.dia + (c.horario ? ' ' + c.horario : '') } : null,
        c.duracion ? { icono:'fa-regular fa-clock',    label:'Duración',      valor: c.duracion } : null,
        c.cupo     ? { icono:'fa-solid fa-users',       label:'Cupo',          valor: c.cupo } : null,
        { icono:'fa-solid fa-box-open', label:'Materiales', valor:'Incluidos' }
      ].filter(Boolean)

      const infoHTML = infoItems.map(item => `
        <div class="curso-info-item">
          <i class="${item.icono}"></i>
          <div>
            <span class="curso-info-label">${item.label}</span>
            <span class="curso-info-valor">${item.valor}</span>
          </div>
        </div>`).join('')

      document.getElementById('cursoContenido').innerHTML = `

        <div class="curso-card">
          <div class="curso-img-wrapper">
            ${c.foto
              ? `<img src="${c.foto}" alt="${c.nombre}">`
              : `<div class="curso-img-placeholder">
                   <i class="fa-solid fa-graduation-cap"></i>
                   <span>Foto próximamente</span>
                 </div>`
            }
            <span class="curso-badge-estado ${estado}">${labels[estado] || estado}</span>
          </div>

          <div class="curso-cuerpo">

            <div class="curso-header">
              <div>
                <h2>${c.nombre || ''}</h2>
                ${c.subtitulo ? `<p class="curso-subtitulo">${c.subtitulo}</p>` : ''}
              </div>
            </div>

            ${c.descripcion ? `
            <div class="curso-intro" style="font-size:15px;line-height:1.7;opacity:0.8">
              <p>${c.descripcion}</p>
            </div>` : ''}

            <div class="curso-info-grid">${infoHTML}</div>

            ${chips ? `
            <div class="curso-seccion">
              <h3>En este curso</h3>
              <div class="curso-chips">${chips}</div>
            </div>` : ''}

            ${pasos ? `
            <div class="curso-seccion">
              <h3>El proceso</h3>
              <div class="curso-tecnicas">${pasos}</div>
            </div>` : ''}

            <div class="curso-seccion curso-pago">
              <i class="fa-solid fa-circle-info"></i>
              <p>Con inscripción previa. Consultanos para conocer la fecha del próximo encuentro y reservar tu lugar.</p>
            </div>

            <a class="curso-btn-consulta" href="#formulario">
              Reservar mi lugar →
            </a>

          </div>
        </div>

        <!-- FORMULARIO -->
        <div class="formulario-wrapper" id="formulario">
          <h2>Reservá tu lugar</h2>
          <p>Completá el formulario y te contactamos a la brevedad.</p>
          <div class="formulario-card">
            <div class="form-grupo">
              <label>Nombre completo *</label>
              <input type="text" id="fNombre" placeholder="Tu nombre">
            </div>
            <div class="form-fila">
              <div class="form-grupo">
                <label>Email *</label>
                <input type="email" id="fEmail" placeholder="tu@email.com">
              </div>
              <div class="form-grupo">
                <label>Teléfono</label>
                <input type="tel" id="fTelefono" placeholder="11 1234-5678">
              </div>
            </div>
            <div class="form-grupo">
              <label>¿Cómo nos conociste?</label>
              <select id="fConociste">
                <option value="">Seleccioná una opción</option>
                <option>Instagram</option>
                <option>TikTok</option>
                <option>YouTube</option>
                <option>Un amigo o familiar</option>
                <option>Google</option>
                <option>Otro</option>
              </select>
            </div>
            <div class="form-grupo">
              <label>Mensaje (opcional)</label>
              <textarea id="fMensaje" rows="3" placeholder="¿Tenés alguna pregunta?"></textarea>
            </div>
            <button class="form-btn" onclick="enviarConsulta('${c.nombre || 'este curso'}')">
              <i class="fa-brands fa-whatsapp"></i> Reservar por WhatsApp
            </button>
          </div>
        </div>
      `
    }

    function enviarConsulta(nombreCurso){
      const nombre    = document.getElementById("fNombre").value.trim()
      const email     = document.getElementById("fEmail").value.trim()
      const telefono  = document.getElementById("fTelefono").value.trim()
      const conociste = document.getElementById("fConociste").value
      const mensaje   = document.getElementById("fMensaje").value.trim()

      if(!nombre || !email){ alert("Por favor completá al menos tu nombre y email."); return }

      let texto = `¡Hola! Me interesa reservar un lugar en: ${nombreCurso}\n\n`
      texto += `*Nombre:* ${nombre}\n`
      texto += `*Email:* ${email}\n`
      if(telefono)  texto += `*Teléfono:* ${telefono}\n`
      if(conociste) texto += `*¿Cómo nos conoció?:* ${conociste}\n`
      if(mensaje)   texto += `*Mensaje:* ${mensaje}\n`

      window.open(`https://wa.me/5491160387535?text=${encodeURIComponent(texto)}`, "_blank")
    }
  </script>

</body>
</html>
