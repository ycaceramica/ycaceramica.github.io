<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piezas artesanales — YCA Cerámica</title>

  <link rel="icon" type="image/png" href="../imagenes/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- CONTENIDO -->
  <div class="pagina-wrapper">

    <div class="pagina-header">
      <h1>Piezas artesanales 🏺</h1>
      <p>Cada pieza es única, hecha a mano con arcilla y esmaltes naturales.</p>
    </div>

    <!-- BUSCADOR -->
    <div class="buscador-wrapper">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="buscadorPiezas" class="buscador-input" placeholder="Buscar por nombre...">
    </div>

    <!-- FILTRO POR CATEGORÍA -->
    <div class="filtros" id="filtros">
      <button class="filtro activo" data-categoria="todas">Todas</button>
    </div>

    <!-- ESTADO DE CARGA -->
    <div class="estado" id="estado">
      <div class="spinner"></div>
      <p>Cargando piezas...</p>
    </div>

    <!-- GRID DE PIEZAS -->
    <div class="piezas-grid" id="piezasGrid"></div>

  </div>

  <a class="whatsapp" href="https://wa.me/5491160387535" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <footer>
    <p>© 2026 YCA Cerámica</p>
  </footer>

  <script src="script.js"></script>
  <script src="../nav-ceramista.js"></script>

</body>
</html>
