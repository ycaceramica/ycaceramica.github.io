<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Pro — YCA Cerámica</title>

  <link rel="icon" type="image/png" href="../imagenes/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- CONTENIDO -->
  <div class="pro-wrapper">

    <!-- VOLVER -->
    <a class="pro-volver" href="../herramientas/index.html">
      ← Volver a herramientas
    </a>

    <!-- HERO -->
    <div class="pro-hero">
      <div class="pro-hero-icono" id="proIcono">🔬</div>
      <div class="pro-badge-hero">⭐ Pro</div>
      <h1 id="proTitulo">Cargando...</h1>
      <p id="proSubtitulo" class="pro-subtitulo"></p>
    </div>

    <!-- DESCRIPCIÓN -->
    <div class="pro-contenido" id="proContenido">
      <!-- Se llena dinámicamente -->
    </div>

    <!-- ACCIONES -->
    <div class="pro-acciones" id="proAcciones">
      <!-- Se llena dinámicamente según plan -->
    </div>

    <!-- MODAL ÉXITO -->
    <div class="pro-modal-overlay" id="modalExito" style="display:none">
      <div class="pro-modal">
        <div class="pro-modal-icono">✅</div>
        <h3>¡Solicitud enviada!</h3>
        <p>Nos llegó tu pedido. Te contactamos a la brevedad para coordinar el acceso.</p>
        <button class="pro-btn-secundario" onclick="cerrarModal()">Cerrar</button>
      </div>
    </div>

    <!-- MODAL ERROR -->
    <div class="pro-modal-overlay" id="modalError" style="display:none">
      <div class="pro-modal">
        <div class="pro-modal-icono">❌</div>
        <h3>Algo salió mal</h3>
        <p id="modalErrorMsg">No se pudo enviar la solicitud. Intentá de nuevo o contactanos por WhatsApp.</p>
        <button class="pro-btn-secundario" onclick="cerrarModal()">Cerrar</button>
      </div>
    </div>

  </div>

  <a class="whatsapp" href="https://wa.me/5491160387535" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <footer>
    <p>© 2026 YCA Cerámica</p>
  </footer>

  <script src="script.js"></script>
  <script src="../nav-ceramista.js"></script>

</body>
</html>
